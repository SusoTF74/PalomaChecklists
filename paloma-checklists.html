let S={user:null,page:'checklist',db:null,timer:'--:--:--',selPts:10,pack:null,inspect:null,myCard:null,thCard:null,rarFilt:'all',adminEditId:null,showImport:false,adminRarity:'comun',muted:false,loading:true};

// ─── UTILS ─────────────────────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,10)}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function canaryDate(){try{return new Intl.DateTimeFormat('sv-SE',{timeZone:'Atlantic/Canary',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date())}catch{return new Date().toISOString().slice(0,10)}}
function calcTimer(){
  try{
    const pts=new Intl.DateTimeFormat('en-US',{timeZone:'Atlantic/Canary',hour:'numeric',minute:'numeric',second:'numeric',hour12:false}).formatToParts(new Date());
    const h=+pts.find(p=>p.type==='hour').value,m=+pts.find(p=>p.type==='minute').value,sv=+pts.find(p=>p.type==='second').value;
    const cur=h*3600+m*60+sv,rst=23*3600+59*60,d=cur<=rst?rst-cur:86400-cur+rst;
    return[Math.floor(d/3600),Math.floor(d%3600/60),d%60].map(x=>String(x).padStart(2,'0')).join(':');
  }catch{return'--:--:--'}
}
function pickR(probs){const r=Math.random()*100;let c=0;for(const[k,v]of Object.entries(probs)){c+=v;if(r<c)return k}return'comun'}
function rollPack(type,pool){
  if(!pool||!pool.length)return[];
  const cfg=SOBRES[type],drawn=[];
  for(let i=0;i<cfg.n;i++){
    const rar=pickR(cfg.probs),cands=pool.filter(c=>c.rarity===rar);
    drawn.push((cands.length?cands:pool)[Math.floor(Math.random()*(cands.length?cands:pool).length)]);
  }
  if(cfg.epic){
    const hasEpic=drawn.some(c=>c.rarity==='epica'||c.rarity==='legendaria');
    if(!hasEpic){
      let ep=pool.filter(c=>c.rarity==='epica'||c.rarity==='legendaria');
      if(!ep.length)ep=pool.filter(c=>c.rarity==='rara');
      if(!ep.length)ep=pool;
      drawn[drawn.length-1]=ep[Math.floor(Math.random()*ep.length)];
    }
  }
  return drawn;
}
function initDB(){return{lastReset:canaryDate(),julia:{pts:0,tasks:[],col:{}},jesus:{pts:0,tasks:[],col:{}},cards:[],trades:[],sounds:{}}}
function ud(){return S.db[S.user]}
function other(){return S.user==='julia'?'jesus':'julia'}

// ─── FIREBASE STORAGE ──────────────────────────────────────────────────────
function save(){
  DB_REF.set(S.db).catch(e=>console.error('Firebase save error:',e));
}

// Firebase guarda arrays vacíos como null — esta función lo corrige
function toArr(v){if(!v)return[];if(Array.isArray(v))return v;return Object.values(v);}

function startSync(){
  DB_REF.on('value', snapshot=>{
    const data=snapshot.val();
    if(!data){
      S.db=initDB();
      save();
    }else{
      if(!data.julia)data.julia={pts:0,tasks:[],col:{}};
      if(!data.jesus)data.jesus={pts:0,tasks:[],col:{}};
      // Convertir null / objetos de Firebase a arrays correctamente
      data.julia.tasks = toArr(data.julia.tasks);
      data.jesus.tasks = toArr(data.jesus.tasks);
      data.julia.col   = data.julia.col   || {};
      data.jesus.col   = data.jesus.col   || {};
      data.julia.pts   = data.julia.pts   || 0;
      data.jesus.pts   = data.jesus.pts   || 0;
      data.cards  = toArr(data.cards);
      data.trades = toArr(data.trades);
      if(!data.sounds)data.sounds={};
      // Reset diario
      const today=canaryDate();
      if(data.lastReset!==today){
        data.lastReset=today;
        data.julia.tasks=[];
        data.jesus.tasks=[];
      }
      S.db=data;
    }
    if(S.loading){S.loading=false;}
    render();
  });
}

// ─── SOUNDS ────────────────────────────────────────────────────────────────
let bgAudio=null;
function playSound(key){
  if(S.muted)return;
  const url=(S.db.sounds||{})[key];
  if(!url)return;
  try{const a=new Audio(url);a.volume=0.7;a.play().catch(()=>{});}catch(e){}
}
function toggleMute(){
  S.muted=!S.muted;
  if(bgAudio){if(S.muted)bgAudio.pause();else bgAudio.play().catch(()=>{});}
  const btn=document.getElementById('mute-btn');
  if(btn)btn.textContent=S.muted?'🔇':'🔊';
}
function startBgMusic(){
  const url=(S.db.sounds||{}).bgMusic;
  if(bgAudio){bgAudio.pause();bgAudio=null;}
  if(!url||S.muted)return;
  try{bgAudio=new Audio(url);bgAudio.loop=true;bgAudio.volume=0.35;bgAudio.play().catch(()=>{});}catch(e){}
}
function testSound(key){
  const el=document.getElementById('snd-'+key);
  if(!el||!el.value.trim())return;
  try{new Audio(el.value.trim()).play().catch(()=>{});}catch(e){}

function doSaveSounds(){

function cardHTML(card,qty,sm,flip){
  if(!card)return'';
  qty=qty||0;sm=sm||false;flip=flip||false;
  const r=R[card.rarity]||R.comun,leg=card.rarity==='legendaria';
  const w=sm?92:148,bw=sm?2:3;
  const shadow=leg?'none':r.glow||'none';
  const cls=(leg?'legend-card ':'')+(flip?'flip-in ':'');
  const icon=leg?'⭐':card.rarity==='epica'?'💜':card.rarity==='rara'?'💚':card.rarity==='poco_comun'?'💙':'⬜';
  const qb=qty>1?'<div style="position:absolute;top:-8px;right:-8px;background:#ff69b4;border-radius:50%;width:19px;height:19px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;color:white;z-index:2">x'+qty+'</div>':'';
  const img=card.image?'<img src="'+esc(card.image)+'" style="width:100%;height:100%;object-fit:cover;image-rendering:pixelated" onerror="this.style.display=\'none\'">':'<span style="font-size:'+(sm?24:38)+'px;opacity:.35">'+icon+'</span>';
  const desc=sm?'':'<div style="font-size:6px;color:#777;background:#050510;border-radius:4px;padding:5px;line-height:1.7;min-height:36px;font-family:monospace">'+esc(card.description||'Sin descripción')+'</div>';
  return '<div class="'+cls+'" style="width:'+w+'px;flex-shrink:0;border:'+bw+'px solid '+(leg?'#ff69b4':r.b)+';border-radius:8px;background:'+r.bg+';padding:'+(sm?5:9)+'px;position:relative;box-shadow:'+shadow+'">'+qb+'<div class="pf" style="font-size:'+(sm?5:7)+'px;color:'+r.tc+';text-align:center;margin-bottom:'+(sm?3:5)+'px;line-height:1.6;min-height:'+(sm?14:22)+'px;word-break:break-word">'+esc(card.title||'???')+'</div><div style="width:100%;aspect-ratio:1;background:#070712;border-radius:4px;margin-bottom:'+(sm?3:5)+'px;overflow:hidden;display:flex;align-items:center;justify-content:center;border:1px solid '+r.b+'33">'+img+'</div>'+desc+'<div class="pf" style="margin-top:'+(sm?3:5)+'px;text-align:center;font-size:5px;color:'+r.tc+';text-transform:uppercase">'+r.lbl+'</div></div>';
}

function pageChecklist(){
  const tasks=ud().tasks||[],done=tasks.filter(t=>t.done);
  const prog=tasks.length?Math.round(done.length/tasks.length*100):0;
  const earnedToday=done.reduce((s,t)=>s+t.pts,0),totalPts=tasks.reduce((s,t)=>s+t.pts,0);
  let html='<div style="max-width:580px">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px"><div class="pf" style="font-size:11px;color:#ff69b4">✅ Mi Checklist</div><div style="text-align:right"><div class="pf" style="font-size:6px;color:#555;margin-bottom:3px">Reinicia en</div><div class="pf timer-el" style="font-size:10px;color:#fbbf24">'+S.timer+'</div></div></div>';
  if(tasks.length>0){
    html+='<div style="background:#130820;border:1px solid #ff69b422;border-radius:10px;padding:12px;margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="pf" style="font-size:7px;color:#c084fc">'+done.length+'/'+tasks.length+' hechas</span><span class="pf" style="font-size:7px;color:#fbbf24">+'+earnedToday+'/'+totalPts+' ⭐</span></div><div style="background:#07070f;border-radius:20px;height:7px;overflow:hidden"><div style="width:'+prog+'%;height:100%;background:linear-gradient(90deg,#ff69b4,#c084fc);border-radius:20px;transition:width .4s"></div></div></div>';
  }
  html+='<div style="display:flex;flex-direction:column;gap:7px;margin-bottom:14px">';
  if(tasks.length===0){
    html+='<div style="text-align:center;padding:32px 0"><div style="font-size:40px;margin-bottom:10px">📝</div><div class="pf" style="font-size:8px;color:#555">Añade tu primera tarea abajo</div></div>';
  }else{
    tasks.forEach((t,i)=>{
      html+='<div class="fade-up" style="display:flex;align-items:center;gap:9px;background:'+(t.done?'#091409':'#130820')+';border:1px solid '+(t.done?'#4ade8033':'#ff69b422')+';border-radius:10px;padding:9px 11px;animation-delay:'+(i*40)+'ms"><div onclick="doToggleTask(\''+t.id+'\')" style="width:22px;height:22px;border-radius:4px;flex-shrink:0;cursor:pointer;border:2px solid '+(t.done?'#4ade80':'#ff69b4')+';background:'+(t.done?'#4ade80':'transparent')+';display:flex;align-items:center;justify-content:center;font-size:13px;color:#0d0618;font-weight:bold">'+(t.done?'✓':'')+'</div><span style="flex:1;font-size:13px;color:'+(t.done?'#6b7280':'#f0d6ff')+';text-decoration:'+(t.done?'line-through':'none')+'">'+esc(t.title)+'</span><span class="pf" style="font-size:7px;padding:3px 7px;background:#fbbf2422;border:1px solid #fbbf2444;border-radius:20px;color:#fbbf24;flex-shrink:0">⭐'+t.pts+'</span><button onclick="doDeleteTask(\''+t.id+'\')" style="background:none;border:none;cursor:pointer;color:#444;font-size:14px;flex-shrink:0;padding:0 2px">🗑️</button></div>';
    });
  }
  html+='</div>';
  const ptsBtns=PTS.map(p=>'<button onclick="S.selPts='+p+';renderPtsButtons()" style="border:1px solid '+(S.selPts===p?'#ff69b4':'#ff69b433')+';border-radius:6px;background:'+(S.selPts===p?'#ff69b4':'transparent')+';color:'+(S.selPts===p?'white':'#ff69b4')+';padding:4px 7px;cursor:pointer;font-size:11px;font-family:\'Press Start 2P\',monospace">'+p+'</button>').join('');
  html+='<div style="background:#130820;border:1px solid #ff69b444;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px"><div class="pf" style="font-size:8px;color:#ff69b4">➕ Nueva tarea</div><input id="new-task-inp" class="inp" placeholder="Nombre de la tarea..." onkeydown="if(event.key===\'Enter\')doAddTask()"><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span class="pf" style="font-size:7px;color:#c084fc;flex-shrink:0">Puntos:</span><div id="pts-buttons" style="display:flex;gap:4px;flex-wrap:wrap">'+ptsBtns+'</div></div><button class="btn" onclick="doAddTask()">Añadir tarea</button></div></div>';
  return html;

  const navSide=NAV.map(n=>'<button class="ns '+(S.page===n.id?'on':'')+'" onclick="S.page=\''+n.id+'\';render()"><span style="font-size:15px">'+n.ic+'</span>'+n.lbl+'</button>').join('');
  const navBot=NAV.map(n=>'<button class="nm '+(S.page===n.id?'on':'')+'" onclick="S.page=\''+n.id+'\';render()"><span style="font-size:18px">'+n.ic+'</span>'+n.lbl+'</button>').join('');
  return '<div style="min-height:100vh"><header style="background:#0f0620;border-bottom:2px solid #ff69b422;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100"><div><div class="pf" style="font-size:8px;color:#ff69b4;line-height:1.9">🕊️ Paloma</div><div class="pf" style="font-size:5px;color:#c084fc">Checklists</div></div><div style="display:flex;align-items:center;gap:9px"><div style="background:#1a0a2e;border:1px solid #fbbf2444;border-radius:20px;padding:4px 11px"><span class="pf" style="font-size:9px;color:#fbbf24">⭐ '+ud().pts+'</span></div><span class="pf" style="font-size:7px;color:'+uInfo.c+'">'+uInfo.name+'</span>'+muteBtn+'<button onclick="S.user=null;S.myCard=null;S.thCard=null;S.pack=null;S.inspect=null;if(bgAudio){bgAudio.pause();bgAudio=null;}render()" style="background:none;border:1px solid #ff69b433;border-radius:6px;color:#ff69b4;cursor:pointer;padding:4px 8px;font-size:13px">✕</button></div></header><div style="display:flex"><div class="snav" style="width:186px;background:#0c0618;border-right:1px solid #ff69b411;padding:12px 8px;display:none;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;flex-shrink:0">'+navSide+'</div><main style="flex:1;padding:14px;overflow-y:auto;min-height:calc(100vh - 52px)" class="mpb">'+pageContent+'</main></div><nav class="bnav" style="position:fixed;bottom:0;left:0;right:0;background:#0c0618;border-top:1px solid #ff69b422;z-index:100;display:none">'+navBot+'</nav></div>';
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function render(){
  if(S.loading){document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px"><div style="font-size:48px">🕊️</div><div class="pf" style="color:#ff69b4;font-size:10px">Cargando...</div></div>';return}
  const app=document.getElementById('app');
  if(!S.user){app.innerHTML=pageLogin();return}
  if(S.user==='admin'){app.innerHTML=pageAdmin();restoreAdminForm();return}
  app.innerHTML=pageMain();
}

let _afc={title:'',rarity:'comun',image:'',desc:''};
function restoreAdminForm(){
  const t=document.getElementById('af-title'),r=document.getElementById('af-rarity'),im=document.getElementById('af-image'),d=document.getElementById('af-desc');
  if(t){t.value=_afc.title;r.value=_afc.rarity;im.value=_afc.image;d.value=_afc.desc}
}
function flashAdmin(msg){const el=document.getElementById('admin-msg');if(el){el.textContent=msg;el.style.display='block';setTimeout(()=>{if(el)el.style.display='none'},2500);}}

// ─── ACTIONS ───────────────────────────────────────────────────────────────
function renderPtsButtons(){document.getElementById('pts-buttons').innerHTML=PTS.map(p=>'<button onclick="S.selPts='+p+';renderPtsButtons()" style="border:1px solid '+(S.selPts===p?'#ff69b4':'#ff69b433')+';border-radius:6px;background:'+(S.selPts===p?'#ff69b4':'transparent')+';color:'+(S.selPts===p?'white':'#ff69b4')+';padding:4px 7px;cursor:pointer;font-size:11px;font-family:\'Press Start 2P\',monospace">'+p+'</button>').join('')}
function togglePw(){const i=document.getElementById('lpw');i.type=i.type==='password'?'text':'password'}

function doLogin(){
  const pw=document.getElementById('lpw').value;
  const lerr=document.getElementById('lerr');
  if(pw===USERS.julia.pw){S.user='julia';S.myCard=null;S.thCard=null;S.pack=null;S.inspect=null;render();startBgMusic();return}
  if(pw===USERS.jesus.pw){S.user='jesus';S.myCard=null;S.thCard=null;S.pack=null;S.inspect=null;render();startBgMusic();return}
  if(pw===APW){S.user='admin';S.myCard=null;S.thCard=null;S.pack=null;S.inspect=null;render();return}
  if(lerr){lerr.textContent='Contraseña incorrecta 💔';lerr.style.display='block'}
}

function doAddTask(){
  const inp=document.getElementById('new-task-inp');
  const title=inp?inp.value.trim():'';
  if(!title)return;
  S.db[S.user].tasks.push({id:uid(),title,pts:S.selPts,done:false});
  playSound('addTask');save();
}

function doToggleTask(id){
  const task=S.db[S.user].tasks.find(t=>t.id===id);
  if(!task)return;
  task.done=!task.done;
  if(task.done)playSound('completeTask');
  S.db[S.user].pts=Math.max(0,S.db[S.user].pts+(task.done?task.pts:-task.pts));
  save();
}

function doDeleteTask(id){
  const task=S.db[S.user].tasks.find(t=>t.id===id);
  if(task&&task.done)S.db[S.user].pts=Math.max(0,S.db[S.user].pts-task.pts);
  S.db[S.user].tasks=S.db[S.user].tasks.filter(t=>t.id!==id);
  save();
}

function doBuyPack(type){
  const cfg=SOBRES[type];
  if(ud().pts<cfg.cost)return;
  if(!S.db.cards.length){alert('No hay cartas aún. El admin tiene que añadirlas primero ✨');return}
  const cards=rollPack(type,S.db.cards);
  cards.forEach(c=>{S.db[S.user].col[c.id]=(S.db[S.user].col[c.id]||0)+1});
  S.db[S.user].pts-=cfg.cost;
  save();
  playSound('openPack');
  S.pack={type,cards,revealed:0};
  render();
  let i=0;
  const iv=setInterval(()=>{
    i++;S.pack.revealed=i;
    const card=S.pack.cards[i-1];
    if(card)playSound(card.rarity);
    const packCards=document.getElementById('pack-cards');
    if(packCards){packCards.innerHTML=S.pack.cards.map((c,idx)=>idx<i?'<div class="flip-in">'+cardHTML(c,0,false,false)+'</div>':'<div class="blink" style="width:148px;background:#07070f;border:2px solid #ff69b422;border-radius:8px;display:flex;align-items:center;justify-content:center;aspect-ratio:.67"><span style="font-size:36px">🎴</span></div>').join('')}
    if(i>=S.pack.cards.length){clearInterval(iv);const ol=document.querySelector('.overlay>div');if(ol){const b=document.createElement('button');b.className='btn';b.style.width='100%';b.style.marginTop='8px';b.textContent='¡Genial! 🌸';b.onclick=()=>{S.pack=null;render()};ol.appendChild(b)}}
  },650);
}

function doTrade(tid,accept){
  const tr=S.db.trades.find(t=>t.id===tid);
  if(!tr||tr.status!=='pending')return;
  tr.status=accept?'accepted':'rejected';
  if(accept){
    playSound('acceptTrade');
    const fc=S.db[tr.from].col,tc=S.db[tr.to].col;
    if((fc[tr.offered]||0)>0)fc[tr.offered]--;fc[tr.requested]=(fc[tr.requested]||0)+1;
    if((tc[tr.requested]||0)>0)tc[tr.requested]--;tc[tr.offered]=(tc[tr.offered]||0)+1;
  }
  save();
}

function doSendTrade(){
  if(!S.myCard||!S.thCard)return;
  const myC=S.db[S.user].col||{},otC=S.db[other()].col||{};
  if((myC[S.myCard]||0)<2){S.myCard=null;render();return}
  if((otC[S.thCard]||0)<1){S.thCard=null;render();return}
  S.db.trades.push({id:uid(),from:S.user,to:other(),offered:S.myCard,requested:S.thCard,status:'pending',ts:Date.now()});
  playSound('requestTrade');
  S.myCard=null;S.thCard=null;save();
}

function doAdminEdit(id){
  const c=S.db.cards.find(c=>c.id===id);if(!c)return;
  S.adminEditId=id;S.adminRarity=c.rarity;
  _afc={title:c.title,rarity:c.rarity,image:c.image||'',desc:c.description||''};
  render();window.scrollTo(0,0);
}

function doAdminSave(){
  const t=document.getElementById('af-title'),r=document.getElementById('af-rarity'),im=document.getElementById('af-image'),d=document.getElementById('af-desc');
  const title=t?t.value.trim():'';if(!title)return;
  const card={id:S.adminEditId||uid(),title,rarity:r?r.value:'comun',image:im?im.value.trim():'',description:d?d.value.trim():''};
  if(S.adminEditId){S.db.cards=S.db.cards.map(c=>c.id===S.adminEditId?card:c)}else{S.db.cards.push(card)}
  S.adminEditId=null;S.adminRarity='comun';_afc={title:'',rarity:'comun',image:'',desc:''};save();render();
  flashAdmin('✅ Carta guardada');
}

function doAdminDelete(id){
  if(!confirm('¿Eliminar esta carta?'))return;
  S.db.cards=S.db.cards.filter(c=>c.id!==id);save();render();
}

function doReset(){
  if(!confirm('RESET TOTAL: borra puntos, tareas, colecciones y trades. Las cartas y sonidos se conservan.'))return;
  if(!confirm('¿Seguro? No se puede deshacer.'))return;
  const snd=S.db.sounds||{},cards=S.db.cards||[];
  S.db={...initDB(),cards,sounds:snd};save();render();
}

function doExport(){
  const b=new Blob([JSON.stringify(S.db,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='paloma-backup.json';a.click();URL.revokeObjectURL(u);
}

function doImport(){
  const ta=document.getElementById('import-ta');if(!ta)return;
  try{
    const d=JSON.parse(ta.value);
    if(!d.julia||!d.jesus)throw new Error('bad');
    S.db=d;save();S.showImport=false;render();
    setTimeout(()=>flashAdmin('✅ Datos importados'),50);
  }catch{alert('JSON inválido.');}
}

// ─── INIT ──────────────────────────────────────────────────────────────────
S.loading=true;
render();
startSync();
setInterval(()=>{
  S.timer=calcTimer();
  document.querySelectorAll('.timer-el').forEach(el=>el.textContent=S.timer);
  try{
    const pts=new Intl.DateTimeFormat('en-US',{timeZone:'Atlantic/Canary',hour:'numeric',minute:'numeric',second:'numeric',hour12:false}).formatToParts(new Date());
    const h=+pts.find(p=>p.type==='hour').value,m=+pts.find(p=>p.type==='minute').value,sv=+pts.find(p=>p.type==='second').value;
    if(h===23&&m===59&&sv===0&&S.db){
      S.db.lastReset=canaryDate();
      S.db.julia.tasks=[];
      S.db.jesus.tasks=[];
      save();render();
    }
  }catch(e){}
},1000);
</script>
</body>
</html>
